<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="description" content="Gamkharu - Place Order">
  <meta name="author" content="Gamkharu">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend+Deca:ital,wght@0,400..900;1,400..900&display=swap');
    
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      font-family: "Lexend Deca", sans-serif;
    }
    
    .form-control,
    .form-control:focus {
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 12px 14px;
      font-family: "Lexend Deca", sans-serif;
      font-size: 0.9rem;
      box-shadow: none;
    }
    
    .form-control:focus {
      border-color: #FF6435;
    }
    
    .form-label {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 4px;
    }
    
    .required-star {
      color: #FF6435;
    }
    
    #place-order-btn {
      border-radius: 14px;
      font-size: 1rem;
      padding: 14px;
    }
    
    .order-item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .order-item-row:last-child {
      border-bottom: none;
    }
  </style>
  <title>Place Order — Gamkharu</title>
</head>

<body>
  
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg p-4 pb-2">
    <div class="container-fluid">
      <img src="img/profile.jpg" style="width: 3rem;" />
      <a class="navbar-brand m-0" href="/">Gamkharu</a>
    </div>
  </nav>
  
  <!-- Page heading -->
  <div class="px-4 pt-2 pb-3 d-flex align-items-center gap-2">
    <a href="javascript:history.back()" class="text-dark" style="font-size:1.4rem; line-height:1;">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="mb-0">Order Summary</h4>
  </div>
  
  <!-- Cart summary -->
  <div class="px-4 pb-3">
    <div class="rounded-4 p-3" style="background:#fff3f0; border:1px solid #ffd5c8;">
      <div id="order-items">
        <!-- Injected by JS -->
      </div>
      <hr style="border-color:#ffd5c8; margin: 10px 0;">
      <div class="d-flex justify-content-between fw-bold">
        <span>Total</span>
        <span id="order-total" style="color:#FF6435;">₹0</span>
      </div>
    </div>
  </div>
  
  <!-- Zoho Form styled -->
  <div class="px-4 pb-5">
    <h5 class="mb-4 mt-2">Delivery Details</h5>
    
    <form action='https://forms.zohopublic.in/myac4636gm1/form/MakeOrder/formperma/8gXguZIljhqAij-CpnNGa85zSC0q9p6j6XdeuF28NN4/htmlRecords/submit' name='form' id='zoho-form' method='POST' accept-charset='UTF-8' enctype='multipart/form-data'>
      
      <!-- Zoho hidden fields -->
      <input type="hidden" name="zf_referrer_name" value="">
      <input type="hidden" name="zf_redirect_url" value="">
      <input type="hidden" name="zc_gad" value="">
      
      <!-- Name -->
      <div class="row gx-3 mb-3">
        <div class="col-6">
          <label class="form-label">First Name <span class="required-star">*</span></label>
          <input type="text" maxlength="255" name="Name_First" class="form-control" placeholder="First name" required />
        </div>
        <div class="col-6">
          <label class="form-label">Last Name</label>
          <input type="text" maxlength="255" name="Name_Last" class="form-control" placeholder="Last name" />
        </div>
      </div>
      
      <!-- Phone -->
      <div class="mb-3">
        <label class="form-label">Phone Number <span class="required-star">*</span></label>
        <input type="text" name="PhoneNumber_countrycode" class="form-control" maxlength="20" placeholder="e.g. 9876543210" required />
      </div>
      
      <!-- Address -->
      <div class="mb-3">
        <label class="form-label">Street Address <span class="required-star">*</span></label>
        <input type="text" maxlength="255" name="Address_AddressLine1" class="form-control" placeholder="House no, Street" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Address Line 2</label>
        <input type="text" maxlength="255" name="Address_AddressLine2" class="form-control" placeholder="Landmark, Area (optional)" />
      </div>
      <div class="row gx-3 mb-3">
        <div class="col-6">
          <label class="form-label">City <span class="required-star">*</span></label>
          <input type="text" maxlength="255" name="Address_City" class="form-control" placeholder="City" required />
        </div>
        <div class="col-6">
          <label class="form-label">State</label>
          <input type="text" maxlength="255" name="Address_Region" class="form-control" placeholder="State" required />
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Pin Code <span class="required-star">*</span></label>
        <input type="text" maxlength="255" name="Address_ZipCode" class="form-control" placeholder="Pin code" required />
      </div>
      
      <!-- Hidden order details textarea — auto-filled by JS -->
      <textarea name="MultiLine" id="order-details-hidden" style="display:none;"></textarea>
      
      <!-- Place Order button -->
      <button type="submit" class="btn btn-danger w-100" id="place-order-btn">
        <i class="bi bi-bag-check me-2"></i>Place Order
      </button>
      
    </form>
  </div>
  
  <!-- Footer -->
  <footer class="mt-4 pt-4 pb-5" style="background:#2c2f2c; color:#ccc;">
    <div class="p-4">
      <div class="text-center mb-4">
        <h5 class="text-white fw-bold">Gamkharu</h5>
        <p class="fst-italic" style="color:#FF6435; font-size:0.95rem;">
          "Where tradition meets elegance — crafted for you, by Gamkharu."
        </p>
      </div>
      <div class="mb-4">
        <p class="text-white fw-semibold mb-2">Quick Links</p>
        <div class="d-flex flex-wrap gap-3" style="font-size:0.9rem;">
          <a href="/" class="text-decoration-none" style="color:#ccc;">Home</a>
          <a href="search" class="text-decoration-none" style="color:#ccc;">All Products</a>
          <a href="search?q=featured" class="text-decoration-none" style="color:#ccc;">Featured</a>
          <a href="aboutus" class="text-decoration-none" style="color:#ccc;">About Us</a>
        </div>
      </div>
      <div class="mb-4">
        <p class="text-white fw-semibold mb-2">Follow Us</p>
        <div class="d-flex gap-3">
          <a href="https://www.instagram.com/gamkharu_boutique05/" class="text-decoration-none d-flex align-items-center justify-content-center rounded-circle" style="width:2.4rem;height:2.4rem;background:#FF6435;color:white;font-size:1.1rem;">
            <i class="bi bi-instagram"></i>
          </a>
          <a href="https://www.facebook.com/gitika.barman.594317/" class="text-decoration-none d-flex align-items-center justify-content-center rounded-circle" style="width:2.4rem;height:2.4rem;background:#FF6435;color:white;font-size:1.1rem;">
            <i class="bi bi-facebook"></i>
          </a>
          <a href="https://wa.me/9395229608" class="text-decoration-none d-flex align-items-center justify-content-center rounded-circle" style="width:2.4rem;height:2.4rem;background:#FF6435;color:white;font-size:1.1rem;">
            <i class="bi bi-whatsapp"></i>
          </a>
        </div>
      </div>
      <hr style="border-color:#333;">
      <p class="text-center mb-0" style="font-size:0.8rem; color:#666;">
        © 2025 Gamkharu, Bajali. All rights reserved.
      </p>
    </div>
  </footer>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="js/loader.js"></script>
  <script src="js/db.js"></script>
  <script src="js/order.js"></script>
</body>

</html>
