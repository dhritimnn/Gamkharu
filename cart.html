<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="description" content="Gamkharu - Cart">
  <meta name="author" content="Gamkharu">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend+Deca:ital,wght@0,400..900;1,400..900&display=swap');
    
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      font-family: "Lexend Deca", sans-serif;
    }
    
    .cart-item {
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    
    .cart-item.removing {
      opacity: 0;
      transform: translateX(40px);
    }
    
    .remove-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.2s;
      padding: 0;
    }
    
    .remove-btn:hover {
      color: #FF6435;
    }
    
    #buy-btn {
      border-radius: 14px;
      font-size: 1rem;
      padding: 14px;
    }
  </style>
  <title>Cart — Gamkharu</title>
</head>

<body>
  
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg p-4 pb-4">
    <div class="container-fluid">
      <img src="img/profile.jpg" style="width: 3rem;" />
      <a class="navbar-brand m-0" href="/">Gamkharu</a>
    </div>
  </nav>
  
  <!-- Page heading -->
  <div class="px-4 pt-2 pb-3 d-flex align-items-center gap-2">
    <a href="javascript:history.back()" class="text-dark" style="font-size:1.4rem; line-height:1;">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="mb-0">My Cart</h4>
    <span class="ms-auto text-muted" style="font-size:0.85rem;" id="item-count"></span>
  </div>
  
  <!-- Empty state -->
  <div id="empty-cart" class="text-center p-5" style="display:none;">
    <i class="bi bi-cart-x" style="font-size:3rem; color:#ddd;"></i>
    <p class="mt-3 text-muted">Your cart is empty.</p>
    <a href="search" class="btn btn-outline-danger mt-2">Browse Products</a>
  </div>
  
  <!-- Cart items -->
  <div id="cart-list" class="px-3 pb-4">
    <!-- Injected by JS -->
  </div>
  
  <!-- Order summary box -->
  <div id="cart-summary" class="px-4 pb-3">
    <div class="rounded-4 p-3" style="background:#fff3f0; border:1px solid #ffd5c8;">
      <div class="d-flex justify-content-between mb-2" style="font-size:0.9rem;">
        <span class="text-muted">Subtotal</span>
        <span id="subtotal">₹0</span>
      </div>
      <div class="d-flex justify-content-between mb-2" style="font-size:0.9rem;">
        <span class="text-muted">Delivery</span>
        <span class="text-success">Free</span>
      </div>
      <hr style="border-color:#ffd5c8;">
      <div class="d-flex justify-content-between fw-bold">
        <span>Total</span>
        <span id="total" style="color:#FF6435;">₹0</span>
      </div>
    </div>
  </div>
  
  <!-- Buy Now button -->
  <div class="px-4 pb-5" id="buy-section">
    <button class="btn btn-danger w-100" id="buy-btn" onclick="window.location.href='order'">
      <i class="bi bi-bag-check me-2"></i>Buy Now
    </button>
  </div>
  
  <!-- Footer -->
  <footer class="mt-4 pt-4 pb-5" style="background:#2c2f2c; color:#ccc;">
    <div class="p-4">
      <div class="text-center mb-4">
        <h5 class="text-white fw-bold">Gamkharu</h5>
        <p class="fst-italic" style="color:#FF6435; font-size:0.95rem;">
          "Where tradition meets elegance — crafted for you, by Gamkharu."
        </p>
      </div>
      <div class="mb-4">
        <p class="text-white fw-semibold mb-2">Quick Links</p>
        <div class="d-flex flex-wrap gap-3" style="font-size:0.9rem;">
          <a href="/" class="text-decoration-none" style="color:#ccc;">Home</a>
          <a href="search" class="text-decoration-none" style="color:#ccc;">All Products</a>
          <a href="search?q=featured" class="text-decoration-none" style="color:#ccc;">Featured</a>
          <a href="aboutus" class="text-decoration-none" style="color:#ccc;">About Us</a>
        </div>
      </div>
      <div class="mb-4">
        <p class="text-white fw-semibold mb-2">Follow Us</p>
        <div class="d-flex gap-3">
          <a href="https://www.instagram.com/gamkharu_boutique05/" class="text-decoration-none d-flex align-items-center justify-content-center rounded-circle" style="width:2.4rem;height:2.4rem;background:#FF6435;color:white;font-size:1.1rem;">
            <i class="bi bi-instagram"></i>
          </a>
          <a href="https://www.facebook.com/gitika.barman.594317/" class="text-decoration-none d-flex align-items-center justify-content-center rounded-circle" style="width:2.4rem;height:2.4rem;background:#FF6435;color:white;font-size:1.1rem;">
            <i class="bi bi-facebook"></i>
          </a>
          <a href="https://wa.me/9395229608" class="text-decoration-none d-flex align-items-center justify-content-center rounded-circle" style="width:2.4rem;height:2.4rem;background:#FF6435;color:white;font-size:1.1rem;">
            <i class="bi bi-whatsapp"></i>
          </a>
        </div>
      </div>
      <hr style="border-color:#333;">
      <p class="text-center mb-0" style="font-size:0.8rem; color:#666;">
        © 2025 Gamkharu, Bajali. All rights reserved.
      </p>
    </div>
  </footer>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="js/loader.js"></script>
  <script src="js/db.js"></script>
  <script src="js/cart.js"></script>
</body>

</html>
