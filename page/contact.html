<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us – Gamkharu</title>

  <link rel="stylesheet" href="../roots/root.css">

  <style>
    .eleh {
      padding: 4rem 2rem 2rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-size: 1.2rem;
      color: #42445A;
    }

    .eleh span {
      height: 5px;
      width: 100px;
      background: #B99F8F70;
    }

    .secfcontact {
      padding: 2rem 1.5rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 560px;
      margin: 0 auto;
    }

    .contact-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: row;
      align-items: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
      text-decoration: none;
    }

    .contact-card:active { transform: scale(0.98); }

    .contact-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.13);
    }

    .contact-card__icon-wrap {
      width: 72px;
      min-width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFF3EE;
    }

    .contact-card__icon-wrap svg {
      width: 28px;
      height: 28px;
    }

    .contact-card__body {
      padding: 1rem 1.2rem;
      flex: 1;
    }

    .contact-card__label {
      font-size: 0.72rem;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 0 0 0.2rem;
    }

    .contact-card__value {
      font-size: 1rem;
      font-weight: 570;
      color: #1a1a1a;
      margin: 0;
      line-height: 1.3;
    }

    .contact-card__arrow {
      margin-right: 1.2rem;
      color: #bbb;
      font-size: 1.2rem;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .contact-card:hover .contact-card__arrow {
      transform: translateX(4px);
      color: #FF6435;
    }

    .contact-divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      color: #bbb;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 0.5rem 0;
    }

    .contact-divider::before,
    .contact-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eee;
    }

    .contact-form-card {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .contact-form-card h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #42445A;
      margin: 0 0 1.2rem;
    }

    .cf-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }

    .cf-field label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .cf-field input,
    .cf-field textarea {
      border: 1.5px solid #eee;
      border-radius: 10px;
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s ease;
      font-family: inherit;
      background: #fafafa;
      resize: none;
    }

    .cf-field input:focus,
    .cf-field textarea:focus {
      border-color: #FF6435;
      background: #fff;
    }

    .cf-submit {
      width: 100%;
      padding: 0.85rem;
      background: #FF6435;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .cf-submit:active {
      transform: scale(0.98);
      background: #e0572a;
    }

    .cf-submit:hover { background: #FF8A4D; }
  </style>
</head>

<body>

  <div id="footer-placeholder"></div>
