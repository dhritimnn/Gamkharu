<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>JSONBin Tester</title>
</head>
<body class="bg-light p-4">

  <div class="card shadow p-4" style="max-width: 600px; margin: auto;">
    <h5 class="fw-bold mb-4">JSONBin Connection Tester</h5>

    <button class="btn btn-primary w-100 mb-3" onclick="testRead()">
      Test READ (fetch current data)
    </button>

    <button class="btn btn-warning w-100 mb-3" onclick="testWrite()">
      Test WRITE (save a dummy item)
    </button>

    <div class="mt-3">
      <p class="fw-semibold mb-1">Result:</p>
      <pre id="output" class="bg-white border rounded p-3" style="min-height:100px; font-size:0.8rem; white-space: pre-wrap; word-break: break-all;">Waiting...</pre>
    </div>
  </div>

  <script>
    const BIN_ID = '69b8f36eb7ec241ddc764dd6';
    const API_KEY = '$2a$10$UDaTvuxqdJMn4L2ppP3LP.WYrjXacmcQVpyjJikn2s0ZbC7cbB8FC';
    const URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

    function show(data) {
      document.getElementById('output').textContent = JSON.stringify(data, null, 2);
    }

    async function testRead() {
      document.getElementById('output').textContent = 'Reading...';
      try {
        const res = await fetch(URL + '/latest', {
          headers: { 'X-Master-Key': API_KEY }
        });
        const data = await res.json();
        show({ status: res.status, data });
      } catch (e) {
        show({ error: e.message });
      }
    }

    async function testWrite() {
      document.getElementById('output').textContent = 'Writing...';
      try {
        const res = await fetch(URL, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': API_KEY
          },
          body: JSON.stringify([{ name: 'Test Item', id: 1, price: '99₹', cat: 'test' }])
        });
        const data = await res.json();
        show({ status: res.status, data });
      } catch (e) {
        show({ error: e.message });
      }
    }
  </script>

</body>
</html>
