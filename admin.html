<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;600;700&display=swap');
    * { font-family: "Lexend Deca", sans-serif; }
  </style>
  <title>Gamkharu Admin</title>
</head>
<body class="bg-light">

  <!-- PIN Screen -->
  <div id="pinScreen" class="d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow" style="width:320px;">
      <h5 class="text-center fw-bold mb-3">Admin Access</h5>
      <input type="number" id="pinInput" class="form-control mb-2" placeholder="Enter PIN">
      <p id="pinError" class="text-danger small mb-2" style="display:none;">Wrong PIN.</p>
      <button class="btn w-100 text-white" style="background:#FF6435;" onclick="checkPin()">Enter</button>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="adminPanel" style="display:none;">
    <nav class="navbar px-4 py-3" style="background:#FF6435;">
      <span class="navbar-brand text-white fw-bold">Gamkharu Admin</span>
      <button class="btn btn-sm btn-light fw-semibold" onclick="saveToDatabase()">
        <i class="bi bi-cloud-upload me-1"></i> Save to Database
      </button>
    </nav>

    <div class="container py-4">

      <!-- Status bar -->
      <div id="statusBar" class="alert py-2 mb-3" style="display:none;"></div>

      <div class="row gap-0 gy-4">

        <!-- Form -->
        <div class="col-12 col-md-6">
          <div class="card p-4 shadow-sm">
            <h6 class="fw-bold mb-3" id="formTitle">Add Product</h6>

            <label class="form-label small">ID (auto)</label>
            <input type="number" id="fieldId" class="form-control form-control-sm mb-2" readonly>

            <label class="form-label small">Name *</label>
            <input type="text" id="fieldName" class="form-control form-control-sm mb-2" placeholder="Mekhela Sador #1" oninput="updatePreview()">

            <label class="form-label small">Price *</label>
            <input type="text" id="fieldPrice" class="form-control form-control-sm mb-2" placeholder="299₹" oninput="updatePreview()">

            <label class="form-label small">Image URL *</label>
            <input type="text" id="fieldUrl" class="form-control form-control-sm mb-2" placeholder="img/mass/01.png" oninput="updatePreview()">

            <label class="form-label small">Image URL 2 (optional)</label>
            <input type="text" id="fieldUrl2" class="form-control form-control-sm mb-2" placeholder="img/mass/01b.png">

            <label class="form-label small">Categories (space-separated tags)</label>
            <input type="text" id="fieldCat" class="form-control form-control-sm mb-2" placeholder="mekhela traditional featured">

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="fieldFeatured" onchange="updatePreview()">
              <label class="form-check-label small" for="fieldFeatured">Featured item</label>
            </div>

            <button id="submitBtn" class="btn w-100 text-white mb-2" style="background:#FF6435;" onclick="submitProduct()">Add Product</button>
            <button id="cancelBtn" class="btn btn-outline-secondary w-100" style="display:none;" onclick="cancelEdit()">Cancel Edit</button>
          </div>
        </div>

        <!-- Preview -->
        <div class="col-12 col-md-6">
          <div class="card p-4 shadow-sm h-100 d-flex flex-column align-items-center justify-content-center">
            <h6 class="fw-bold mb-3 w-100">Live Preview</h6>
            <div class="card rounded-4" style="width:12rem;">
              <img id="previewImg" src="https://picsum.photos/300/351" class="card-img-top rounded-4" onerror="this.src='https://picsum.photos/300/351'">
              <div class="card-body">
                <span id="previewBadge" class="badge bg-warning text-dark mb-1" style="display:none;">Featured</span>
                <p id="previewName" class="card-text mb-0">Product Name</p>
                <h5 id="previewPrice" class="card-text mt-1" style="color:#FF6435;">0₹</h5>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Product Table -->
      <div class="card mt-4 shadow-sm">
        <div class="card-header fw-bold">All Products <span class="text-muted fw-normal small">(unsaved changes won't appear on site until you click Save)</span></div>
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="productTable"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/db.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
