<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="author" content="Gamkharu">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend+Deca:ital,wght@0,400..900;1,400..900&display=swap');

    * {
      margin: 0;
      padding: 0;
      font-family: "Lexend Deca", sans-serif;
    }

    .form-control, .form-control:focus {
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 12px 14px;
      font-size: 0.9rem;
      font-family: "Lexend Deca", sans-serif;
      box-shadow: none;
    }

    .form-control:focus {
      border-color: #FF6435;
    }

    .form-label {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 4px;
    }

    .tag-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff3f0;
      color: #FF6435;
      border: 1px solid #FF6435;
      border-radius: 999px;
      padding: 3px 12px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .tag-pill i {
      font-size: 0.75rem;
    }

    #output-box {
      background: #1a1a1a;
      color: #f0f0f0;
      border-radius: 12px;
      padding: 16px;
      font-family: monospace;
      font-size: 0.85rem;
      white-space: pre;
      overflow-x: auto;
    }

    #pin-screen {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #FF6435;
      background: white;
      transition: background 0.2s;
    }

    .pin-dot.filled {
      background: #FF6435;
    }

    .pin-key {
      width: 5rem;
      height: 5rem;
      border-radius: 50%;
      border: 1px solid #eee;
      background: white;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .pin-key:active {
      background: #fff3f0;
    }

    .pin-key.del {
      color: #FF6435;
    }

    #pin-error {
      color: #FF6435;
      font-size: 0.85rem;
      min-height: 1.2rem;
      margin-top: 8px;
    }

    #preview-card {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #f0f0f0;
      max-width: 180px;
    }

    #preview-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }
  </style>
  <title>Admin — Gamkharu</title>
</head>

<body>

  <!-- ── PIN Screen ─────────────────────────────────────────────────────────── -->
  <div id="pin-screen">
    <h5 class="fw-bold mb-1">Gamkharu Admin</h5>
    <p class="text-muted mb-4" style="font-size:0.85rem;">Enter PIN to continue</p>

    <div class="d-flex gap-3 mb-4" id="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>

    <div id="pin-error"></div>

    <div class="mt-3 d-grid gap-3" style="grid-template-columns: repeat(3, 1fr); display:grid;">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <div></div>
      <button class="pin-key" onclick="pinPress('0')">0</button>
      <button class="pin-key del" onclick="pinDelete()"><i class="bi bi-delete-left"></i></button>
    </div>
  </div>

  <!-- ── Admin Panel ────────────────────────────────────────────────────────── -->
  <div id="admin-panel" style="display:none;">

    <nav class="navbar p-4 pb-2 border-bottom">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 fw-bold">
          <i class="bi bi-shield-lock me-2" style="color:#FF6435;"></i>Gamkharu Admin
        </span>
        <button class="btn btn-outline-secondary btn-sm" onclick="lockAdmin()" style="border-radius:10px;">
          <i class="bi bi-lock me-1"></i>Lock
        </button>
      </div>
    </nav>

    <div class="p-4">
      <h5 class="mb-4">Add New Product</h5>

      <div class="d-flex flex-column gap-3">

        <!-- Name -->
        <div>
          <label class="form-label">Product Name <span style="color:#FF6435;">*</span></label>
          <input type="text" id="f-name" class="form-control" placeholder="e.g. Kapur #1"
            oninput="updatePreview()" />
        </div>

        <!-- Auto ID -->
        <div>
          <label class="form-label">Product ID <span style="color:#FF6435;">*</span></label>
          <div class="d-flex gap-2 align-items-center">
            <input type="number" id="f-id" class="form-control" placeholder="Auto-generating..."
              style="background:#f9f9f9;" readonly />
            <button class="btn btn-outline-secondary px-3" style="border-radius:12px;"
              onclick="fetchNextId()" title="Refresh ID">
              <i class="bi bi-arrow-clockwise"></i>
            </button>
          </div>
          <p class="text-muted mt-1" style="font-size:0.75rem;" id="id-hint"></p>
        </div>

        <!-- Price -->
        <div>
          <label class="form-label">Price <span style="color:#FF6435;">*</span></label>
          <input type="text" id="f-price" class="form-control" placeholder="e.g. 299₹"
            oninput="updatePreview()" />
        </div>

        <!-- URL -->
        <div>
          <label class="form-label">Image URL (url)</label>
          <input type="text" id="f-url" class="form-control" placeholder="img/mass/04.png"
            oninput="updatePreview()" />
        </div>

        <!-- URL2 -->
        <div>
          <label class="form-label">Image URL 2 (url2)</label>
          <input type="text" id="f-url2" class="form-control" placeholder="img/mass/04b.png" />
        </div>

        <!-- Tags -->
        <div>
          <label class="form-label">Tags (cat) <span style="color:#FF6435;">*</span></label>
          <div class="d-flex gap-2 mb-2 flex-wrap" id="tag-pills"></div>
          <div class="d-flex gap-2">
            <input type="text" id="tag-input" class="form-control" placeholder="Type a tag and press Add"
              onkeydown="if(event.key==='Enter'){event.preventDefault();addTag();}" />
            <button class="btn btn-outline-danger px-3" style="border-radius:12px;" onclick="addTag()">Add</button>
          </div>
        </div>

        <!-- Preview -->
        <div>
          <label class="form-label">Preview</label>
          <div id="preview-card">
            <img id="preview-img" src="https://picsum.photos/300/351"
              onerror="this.src='https://picsum.photos/300/351'">
            <div class="p-2">
              <p id="preview-name" class="mb-0" style="font-size:0.9rem; font-weight:600;">Product Name</p>
              <p id="preview-price" class="mb-0" style="font-size:0.85rem; color:#FF6435;">Price</p>
            </div>
          </div>
        </div>

        <!-- Generate -->
        <button class="btn btn-danger w-100 p-3" style="border-radius:14px;" onclick="generateJSON()">
          <i class="bi bi-code-slash me-2"></i>Generate JSON
        </button>

      </div>

      <!-- Output -->
      <div id="output-section" class="mt-4" style="display:none;">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <label class="form-label mb-0">Copy & paste at the top of database.json</label>
          <button class="btn btn-sm btn-outline-secondary" style="border-radius:10px;" onclick="copyJSON()">
            <i class="bi bi-clipboard me-1"></i><span id="copy-label">Copy</span>
          </button>
        </div>
        <div id="output-box"></div>
        <p class="text-muted mt-2" style="font-size:0.8rem;">
          <i class="bi bi-info-circle me-1"></i>
          Open <code>database.json</code>, paste inside the <code>[</code> at the very top, followed by a comma.
        </p>
      </div>

      <!-- Reset -->
      <button class="btn btn-outline-secondary w-100 mt-3 mb-5" style="border-radius:14px;" onclick="resetForm()">
        <i class="bi bi-arrow-counterclockwise me-2"></i>Reset Form
      </button>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <script>

    // ── PIN ────────────────────────────────────────────────────────────────────

    const ADMIN_PIN = '5667'; // ← CHANGE THIS TO YOUR PIN

    let pinEntry = '';

    function pinPress(digit) {
      if (pinEntry.length >= 4) return;
      pinEntry += digit;
      updateDots();
      if (pinEntry.length === 4) checkPin();
    }

    function pinDelete() {
      pinEntry = pinEntry.slice(0, -1);
      updateDots();
      document.getElementById('pin-error').textContent = '';
    }

    function updateDots() {
      for (let i = 0; i < 4; i++) {
        document.getElementById('dot-' + i).classList.toggle('filled', i < pinEntry.length);
      }
    }

    function checkPin() {
      if (pinEntry === ADMIN_PIN) {
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        fetchNextId();
      } else {
        document.getElementById('pin-error').textContent = 'Incorrect PIN. Try again.';
        pinEntry = '';
        updateDots();
      }
    }

    function lockAdmin() {
      pinEntry = '';
      updateDots();
      document.getElementById('pin-error').textContent = '';
      document.getElementById('admin-panel').style.display = 'none';
      document.getElementById('pin-screen').style.display = 'flex';
    }

    // ── Auto ID ────────────────────────────────────────────────────────────────

    async function fetchNextId() {
      const hintEl = document.getElementById('id-hint');
      const idEl = document.getElementById('f-id');
      idEl.value = '';
      hintEl.textContent = 'Loading...';
      try {
        const response = await fetch('database.json');
        const products = await response.json();
        const maxId = products.reduce((max, p) => Math.max(max, p.id || 0), 0);
        const nextId = maxId + 1;
        idEl.value = nextId;
        hintEl.textContent = 'Last ID in database: ' + maxId + ' → Next: ' + nextId;
      } catch {
        hintEl.textContent = 'Could not load database.json. Enter ID manually.';
        idEl.removeAttribute('readonly');
        idEl.style.background = 'white';
        idEl.placeholder = 'Enter manually';
      }
    }

    // ── Tags ───────────────────────────────────────────────────────────────────

    let tags = [];

    function addTag() {
      const input = document.getElementById('tag-input');
      const val = input.value.trim().toLowerCase().replace(/\s+/g, '');
      if (!val || tags.includes(val)) { input.value = ''; return; }
      tags.push(val);
      input.value = '';
      renderTags();
    }

    function removeTag(tag) {
      tags = tags.filter(t => t !== tag);
      renderTags();
    }

    function renderTags() {
      document.getElementById('tag-pills').innerHTML = tags.map(tag => `
        <span class="tag-pill" onclick="removeTag('${tag}')">
          #${tag} <i class="bi bi-x"></i>
        </span>
      `).join('');
    }

    // ── Preview ────────────────────────────────────────────────────────────────

    function updatePreview() {
      const name = document.getElementById('f-name').value || 'Product Name';
      const price = document.getElementById('f-price').value || 'Price';
      const url = document.getElementById('f-url').value || 'https://picsum.photos/300/351';
      document.getElementById('preview-name').textContent = name;
      document.getElementById('preview-price').textContent = price;
      document.getElementById('preview-img').src = url;
    }

    // ── Generate JSON ──────────────────────────────────────────────────────────

    function generateJSON() {
      const name = document.getElementById('f-name').value.trim();
      const id = document.getElementById('f-id').value.trim();
      const price = document.getElementById('f-price').value.trim();
      const url = document.getElementById('f-url').value.trim();
      const url2 = document.getElementById('f-url2').value.trim();

      if (!name || !id || !price) {
        alert('Please fill in Name, ID and Price at minimum.');
        return;
      }

      const obj = {
        name,
        id: parseInt(id),
        url: url || 'img/mass/placeholder.png',
        url2: url2 || url || 'img/mass/placeholder.png',
        price,
        cat: tags.join(' ')
      };

      const json = JSON.stringify(obj, null, 2);
      document.getElementById('output-box').textContent = json + ',';
      document.getElementById('output-section').style.display = 'block';
      document.getElementById('copy-label').textContent = 'Copy';
    }

    // ── Copy ───────────────────────────────────────────────────────────────────

    function copyJSON() {
      const text = document.getElementById('output-box').textContent;
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('copy-label').textContent = 'Copied!';
        setTimeout(() => document.getElementById('copy-label').textContent = 'Copy', 2000);
      });
    }

    // ── Reset ──────────────────────────────────────────────────────────────────

    function resetForm() {
      document.getElementById('f-name').value = '';
      document.getElementById('f-price').value = '';
      document.getElementById('f-url').value = '';
      document.getElementById('f-url2').value = '';
      document.getElementById('tag-input').value = '';
      tags = [];
      renderTags();
      updatePreview();
      document.getElementById('output-section').style.display = 'none';
      fetchNextId();
    }

  </script>

</body>

</html>
