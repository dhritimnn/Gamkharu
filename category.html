<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="description" content="Gamkharu - All Categories">
  <meta name="author" content="Gamkharu">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend+Deca:ital,wght@0,400..900;1,400..900&display=swap');
    
    * {
      user-select: none;
      margin: 0;
      padding: 0;
      font-family: "Lexend Deca", sans-serif;
    }
    
    .cat-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #eee;
      background: white;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      color: #222;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    
    .cat-btn:hover {
      background: #fff3f0;
      border-color: #FF6435;
      color: #FF6435;
    }
    
    .cat-btn i {
      color: #FF6435;
      font-size: 1rem;
    }
    
    .cat-btn .cat-count-badge {
      font-size: 0.75rem;
      color: #aaa;
      margin-right: 8px;
    }
    
    #cat-search {
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-family: "Lexend Deca", sans-serif;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    
    #cat-search:focus {
      border-color: #FF6435;
    }
    
    #no-results {
      text-align: center;
      color: #aaa;
      padding: 2rem 0;
      display: none;
    }
    
    .cat-item.hidden {
      display: none;
    }
  </style>
  <title>Categories — Gamkharu</title>
</head>

<body>
  
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg p-4 pb-2">
    <div class="container-fluid">
      <img src="img/profile.jpg" style="width: 3rem;" />
      <a class="navbar-brand m-0 ms-2" href="/">Gamkharu</a>
      <div class="d-flex align-items-center gap-3 ms-auto me-2">
        <a href="wishlist" class="text-dark" style="font-size:1.1rem;"><i class="bi bi-heart"></i></a>
        <a href="cart" class="text-dark" style="font-size:1.1rem;"><i class="bi bi-cart"></i></a>
      </div>
    </div>
  </nav>
  
  <!-- Page heading -->
  <div class="px-4 pt-2 pb-3 d-flex align-items-center gap-2">
    <a href="javascript:history.back()" class="text-dark" style="font-size:1.4rem; line-height:1;">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="mb-0">All Categories</h4>
    <span class="ms-auto text-muted" style="font-size:0.85rem;" id="cat-count"></span>
  </div>
  
  <!-- Search filter -->
  <div class="px-4 pb-3 d-flex gap-2">
    <input type="text" id="cat-search" placeholder="Search categories..." oninput="filterCategories()" style="flex:1;" />
    <button id="sort-btn" onclick="toggleSort()" class="btn btn-outline-secondary" style="border-radius:12px; white-space:nowrap; font-size:0.85rem;">
      A → Z
    </button>
  </div>
  
  <!-- Categories list -->
  <div class="px-4 pb-5">
    <div class="d-flex flex-column gap-2" id="cat-list">
      <!-- Injected by JS -->
    </div>
    <div id="no-results">
      <i class="bi bi-search" style="font-size:2rem;"></i>
      <p class="mt-2">No categories found.</p>
    </div>
  </div>
  
  <!-- Footer -->
  <footer class="mt-2 pt-4 pb-5" style="background:#2c2f2c; color:#ccc;">
    <div class="p-4">
      <div class="text-center mb-4">
        <h5 class="text-white fw-bold">Gamkharu</h5>
        <p class="fst-italic" style="color:#FF6435; font-size:0.95rem;">
          "Where tradition meets elegance — crafted for you, by Gamkharu."
        </p>
      </div>
      <div class="mb-4">
        <p class="text-white fw-semibold mb-2">Quick Links</p>
        <div class="d-flex flex-wrap gap-3" style="font-size:0.9rem;">
          <a href="/" class="text-decoration-none" style="color:#ccc;">Home</a>
          <a href="search" class="text-decoration-none" style="color:#ccc;">All Products</a>
          <a href="search?q=featured" class="text-decoration-none" style="color:#ccc;">Featured</a>
          <a href="aboutus" class="text-decoration-none" style="color:#ccc;">About Us</a>
        </div>
      </div>
      <div class="mb-4">
        <p class="text-white fw-semibold mb-2">Follow Us</p>
        <div class="d-flex gap-3">
          <a href="https://www.instagram.com/gamkharu_boutique05/" class="text-decoration-none d-flex align-items-center justify-content-center rounded-circle" style="width:2.4rem;height:2.4rem;background:#FF6435;color:white;font-size:1.1rem;">
            <i class="bi bi-instagram"></i>
          </a>
          <a href="https://www.facebook.com/gitika.barman.594317/" class="text-decoration-none d-flex align-items-center justify-content-center rounded-circle" style="width:2.4rem;height:2.4rem;background:#FF6435;color:white;font-size:1.1rem;">
            <i class="bi bi-facebook"></i>
          </a>
          <a href="https://wa.me/9395229608" class="text-decoration-none d-flex align-items-center justify-content-center rounded-circle" style="width:2.4rem;height:2.4rem;background:#FF6435;color:white;font-size:1.1rem;">
            <i class="bi bi-whatsapp"></i>
          </a>
        </div>
      </div>
      <hr style="border-color:#333;">
      <p class="text-center mb-0" style="font-size:0.8rem; color:#666;">
        © 2025 Gamkharu, Bajali. All rights reserved.
      </p>
    </div>
  </footer>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="js/loader.js"></script>
  <script src="js/db.js"></script>
  <script>
    // ─── Load and build categories from database.json ─────────────────────────
    
    async function loadCategories() {
      const response = await fetch('database.json');
      const products = await response.json();
      
      // Collect all unique tags with product count
      const tagMap = {};
      products.forEach(p => {
        if (!p.cat) return;
        p.cat.toLowerCase().split(/\s+/).filter(Boolean).forEach(tag => {
          tagMap[tag] = (tagMap[tag] || 0) + 1;
        });
      });
      
      // Sort alphabetically
      const tags = Object.keys(tagMap).sort();
      
      const list = document.getElementById('cat-list');
      
      if (tags.length === 0) {
        list.innerHTML = `<p class="text-muted text-center py-4">No categories found.</p>`;
        return;
      }
      
      list.innerHTML = tags.map(tag => `
        <div class="cat-item" data-name="${tag}">
          <a href="search?q=${encodeURIComponent(tag)}" class="cat-btn">
            <span style="text-transform: capitalize;">${tag}</span>
            <div class="d-flex align-items-center">
              <span class="cat-count-badge">${tagMap[tag]} item${tagMap[tag] > 1 ? 's' : ''}</span>
              <i class="bi bi-chevron-right"></i>
            </div>
          </a>
        </div>
      `).join('');
      
      filterCategories();
    }
    
    // ─── Real-time filter ─────────────────────────────────────────────────────
    
    function filterCategories() {
      const query = document.getElementById('cat-search').value.trim().toLowerCase();
      const items = document.querySelectorAll('.cat-item');
      const noResults = document.getElementById('no-results');
      const countEl = document.getElementById('cat-count');
      
      let visible = 0;
      
      items.forEach(item => {
        const name = item.getAttribute('data-name').toLowerCase();
        if (!query || name.includes(query)) {
          item.classList.remove('hidden');
          visible++;
        } else {
          item.classList.add('hidden');
        }
      });
      
      noResults.style.display = visible === 0 ? 'block' : 'none';
      countEl.textContent = visible + ' categor' + (visible === 1 ? 'y' : 'ies');
    }
    
    // ─── Sort ─────────────────────────────────────────────────────────────────
    
    let sortOrder = 'az';
    
    function toggleSort() {
      sortOrder = sortOrder === 'az' ? 'za' : 'az';
      document.getElementById('sort-btn').textContent = sortOrder === 'az' ? 'A → Z' : 'Z → A';
      renderSorted();
    }
    
    function renderSorted() {
      const list = document.getElementById('cat-list');
      const items = [...list.querySelectorAll('.cat-item')];
      items.sort((a, b) => {
        const nameA = a.getAttribute('data-name');
        const nameB = b.getAttribute('data-name');
        return sortOrder === 'az' ?
          nameA.localeCompare(nameB) :
          nameB.localeCompare(nameA);
      });
      items.forEach(item => list.appendChild(item));
      filterCategories();
    }
    
    document.addEventListener('DOMContentLoaded', loadCategories);
  </script>
  
</body>

</html>
