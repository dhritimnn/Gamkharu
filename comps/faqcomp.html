<div id="faq-comp">
  <style>
      .eleh {
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-size: 1.2rem;
      color: #FF5603;
    }
    
    .eleh span {
      height: 5px;
      width: 100px;
      background: #B99F8F70;
    }
    
    .faq-list {
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      padding: 1rem 1.5rem 2rem;
      box-sizing: border-box;
    }
    
    .faq-item {
      border-bottom: 1px solid #B99F8F70;
      margin-bottom: 0.5rem;
      overflow: hidden;
    }
    
    .faq-question {
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      padding: 1rem 0;
      font-size: 1rem;
      color: #333;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }
    
    .faq-question::after {
      content: '+';
      font-size: 1.4rem;
      color: #FF5603;
      flex-shrink: 0;
      margin-left: 1rem;
      transition: transform 0.3s ease;
    }
    
    .faq-item.open .faq-question::after {
      transform: rotate(45deg);
    }
    
    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.3s ease;
      padding: 0;
      color: #555;
      font-size: 0.95rem;
      line-height: 1.6;
      box-sizing: border-box;
    }
    
    .faq-item.open .faq-answer {
      max-height: 300px;
      padding-bottom: 1rem;
    }
  </style>
  
  <div class="eleh">
    <h2>FAQ</h2>
    <span></span>
  </div>
  
  <div class="faq-list" id="faq-list"></div>
</div>
