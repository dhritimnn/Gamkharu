<div id="featured-root" style="">
  <style>
    #featured-root {
      z-index: 0;
      padding: 1rem;
      font-family: inherit;
      color: darkslategrey;
    }

    #featured-header {
      display: flex;
align-items: center;
justify-content: space-between;
      margin-bottom: .85rem;
    }

    #featured-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0;
    }

    #featured-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 3px;
    }

    .ft-card {
      aspect-ratio: 3/4;
      background: #f5f0ee;
      overflow: hidden;
      cursor: pointer;
    }

    .ft-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s ease;
    }

    .ft-card:active img {
      transform: scale(1.05);
    }

    #featured-more {
      display: block;
      width: 100%;
      margin-top: .85rem;
      padding: .8rem;
      background: #fff3ee;
      border: 1.5px solid #FF5400;
      color: #FF5400;
      font-size: .95rem;
      font-weight: 700;
      border-radius: .6rem;
      cursor: pointer;
      text-align: center;
    }
  </style>

  <div id="featured-header">
    <h2>New Arrivals</h2>
  </div>

  <div id="featured-grid"></div>
  <button id="featured-more" onclick="window.location.href='search.html'">Explore More →</button>


</div>
